<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>🌾 Crop Price Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
</head>

<body>
    <header class="header">
        <div class="header-logo">🌾 AI Agriculture</div>
    </header>

    <nav class="sidebar">
        <div class="sidebar-logo">🌾 AI Agriculture</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="/">Home</a>
            </li>
            <li class="sidebar-item active">
                <a href="/price_prediction">Price Prediction</a>
            </li>
            <li class="sidebar-item">
                <a href="/disease_detection">Disease Detection</a>
            </li>
            <li class="sidebar-item">
                <a href="/weather_forecasting">Weather Forecasting</a>
            </li>
        </ul>
    </nav>

    <main class="main">
        <div class="form-card">
            <h2>🌾 Crop Price Predictor</h2>

            <form id="predictForm">
                <label for="month">Month</label>
                <select id="month" required>
                    <option value="">-- Select Month --</option>
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March">March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option>
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>

                <label for="location">Location</label>
                <select id="location" required>
                    <option value="">-- Select Location --</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="West Bengal">West Bengal</option>
                </select>

                <label for="crop">Crop</label>
                <select id="crop" required>
                    <option value="">-- Select Crop --</option>
                    <option value="Wheat">Wheat</option>
                    <option value="Rice">Rice</option>
                    <option value="Maize">Maize</option>
                    <option value="Sugarcane">Sugarcane</option>
                    <option value="Cotton">Cotton</option>
                    <option value="Mustard">Mustard</option>
                    <option value="Soybean">Soybean</option>
                    <option value="Jute">Jute</option>
                </select>

                <button type="submit">Predict Price</button>
            </form>

            <div id="result" class="result-box" style="display: none;"></div>
            <div id="error" class="error-box" style="display: none;"></div>
        </div>
    </main>

    <script>
        const form = document.getElementById("predictForm");
        constresultBox = document.getElementById("result");
        consterrorBox = document.getElementById("error");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();
            resultBox.style.display = "none";
            errorBox.style.display = "none";

            const month = document.getElementById("month").value;
            const location = document.getElementById("location").value;
            const crop = document.getElementById("crop").value;

            if (!month || !location || !crop) {
                errorBox.innerText = "Please select Month, Location, and Crop.";
                errorBox.style.display = "block";
                return;
            }

            try {
                const response = await fetch("/price/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        month: month,
                        location: location,
                        crop_type: crop  // ← no .toLowerCase()
                    }),
                });

                const data = await response.json();
                console.log("📡 Response:", data);

                if (response.ok&& "predicted_price" in data) {
                    resultBox.innerHTML = `
                        <h3>✅ Price Prediction</h3>
                        <p><strong>Month:</strong> ${month}</p>
                        <p><strong>Location:</strong> ${location}</p>
                        <p><strong>Crop:</strong> ${crop}</p>
                        <p><strong>Predicted Price/quintal:</strong>
                           <span style="font-size: 1.5em; color: green;">₹${data.predicted_price}</span></p>
                    `;
                    resultBox.style.display = "block";
                } else {
                    errorBox.innerText = `Error: ${data.error || "Unknown error"}`;
                    errorBox.style.display = "block";
                }
            } catch (err) {
                console.error("❌ Fetch error:", err);
                errorBox.innerText = "Failed to connect to backend. Check Flask terminal.";
                errorBox.style.display = "block";
            }
        });
    </script>
</body>

</html>
